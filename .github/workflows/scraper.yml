name: Playwright Scraper Bot

on:
  push:
    branches:
      - main  # Triggers when you merge your dev work into main
  schedule:
    # 9:32 PM HKT (13:32 UTC) on Tue, Thu, Sat, Sun
    - cron: '32 13 * * 2,4,6,0'
  workflow_dispatch: # Allows manual runs for testing

jobs:
  scrape-and-clean:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          python -m playwright install --with-deps chromium

      - name: Run Scraper
        run: python playwright_scraper.py

      - name: Remove JS Console Logs for Production
        # If you have frontend code in this repo, this scrubs it before shipping to prod
        run: |
          find . -name "*.js" -exec sed -i -E 's/console\.log\(.*\);?//g' {} +
          echo "Cleaned all console.logs from JS files."

      - name: Deploy Clean Code & Data to Prod Branch
        # This takes the output JSON AND the scrubbed JS files and pushes them to 'prod'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .        # Deploy the entire workspace directory
          branch: prod     # Push everything to your clean production branch
          token: ${{ secrets.GITHUB_TOKEN }}